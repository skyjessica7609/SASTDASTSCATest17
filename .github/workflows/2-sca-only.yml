name: 2. SCA - Dependency Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write

jobs:
  sca:
    name: OWASP Dependency-Check (SCA) + pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 1) Generic SCA with Dependency-Check
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'calculator-app'
          path: '.'
          format: 'ALL'
          out: 'reports'
          args: >
            --failOnCVSS 7
            --enableRetired
            --disableOssIndex

      - name: Upload Dependency-Check reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: reports/

      - name: Upload SARIF to GitHub Security (if present)
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('reports/dependency-check-report.sarif') != ''
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: sca

      # 2) Python-focused SCA with pip-audit
      - name: Install pip-audit
        run: |
          python -m pip install pip-audit

      - name: Run pip-audit on requirements.txt
        run: |
          pip-audit -r requirements.txt -f json -o pip-audit-report.json || true

      - name: Print pip-audit summary
        run: |
          python - << 'EOF'
          import json, pathlib

          path = pathlib.Path("pip-audit-report.json")
          if not path.exists():
              print("pip-audit-report.json not found, skipping summary")
              raise SystemExit(0)

          with path.open() as f:
              data = json.load(f)

          if isinstance(data, dict) and "dependencies" in data:
              deps = data["dependencies"]
          else:
              deps = data

          total_vulns = 0
          vulnerable_pkgs = 0
          for dep in deps:
              vulns = dep.get("vulns", [])
              if vulns:
                  vulnerable_pkgs += 1
                  total_vulns += len(vulns)

          print(f"pip-audit summary: Found {total_vulns} known vulnerabilities in {vulnerable_pkgs} packages")
          EOF

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
